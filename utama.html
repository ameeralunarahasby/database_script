<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Manajemen Pegawai</title>
    <style>
        :root { --primary: #007BFF; --sidebar-bg: #2c3e50; --text-light: #ecf0f1; --hover-bg: #34495e; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; background: #f4f7f6; }
        
        /* Sidebar Styles */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--text-light); transition: 0.3s; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar.hidden { margin-left: -260px; }
        .sidebar-header { padding: 20px; font-size: 18px; font-weight: bold; background: #1a252f; text-align: center; letter-spacing: 1px; }
        
        .nav-item { list-style: none; margin: 0; padding: 0; }
        .nav-link { display: block; padding: 15px 20px; color: var(--text-light); text-decoration: none; cursor: pointer; border-bottom: 1px solid #34495e; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--hover-bg); border-left: 4px solid var(--primary); padding-left: 16px; }
        
        /* Dropdown Styles */
        .dropdown-container { display: none; background: #1a252f; }
        .dropdown-container a { display: block; padding: 12px 20px 12px 40px; color: #bdc3c7; text-decoration: none; font-size: 14px; border-bottom: 1px solid #2c3e50; transition: 0.2s; }
        .dropdown-container a:hover { color: white; background: var(--hover-bg); }
        .dropdown-btn { display: flex; justify-content: space-between; align-items: center; }
        .dropdown-btn::after { content: '▼'; font-size: 10px; transition: 0.3s; }
        .dropdown-btn.active::after { transform: rotate(180deg); }

        /* Main Content Styles */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; transition: 0.3s; }
        .top-navbar { height: 60px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; padding: 0 20px; }
        .toggle-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #333; }
        .content-frame { flex: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">HRIS DASHBOARD</div>
        <ul class="nav-item">
            <li><a class="nav-link" href="#" onclick="loadPage('html/dashboard_placeholder.html')">Dashboard</a></li>
            
            <li>
                <a class="nav-link dropdown-btn">Master Data</a>
                <div class="dropdown-container">
                    <a href="#" onclick="loadPage('html/pegawai.html')">Data Pegawai</a>
                    <a href="#">Pegawai Masuk</a>
                    <a href="#">Pegawai Keluar</a>
                </div>
            </li>
            
            <li>
                <a class="nav-link dropdown-btn">Kredensial / Profesi</a>
                <div class="dropdown-container">
                    <a href="#">Berkas STR</a>
                    <a href="#">Berkas SIK</a>
                    <a href="#">SPK dan RKK</a>
                    <a href="#">Berkas OPPE</a>
                </div>
            </li>
            
            <li>
                <a class="nav-link dropdown-btn">Kinerja dan Kompetensi</a>
                <div class="dropdown-container">
                    <a href="#">SKP Pegawai</a>
                    <a href="#">Sertifikat Pelatihan</a>
                </div>
            </li>
            
            <li><a class="nav-link" href="#">Pengaturan</a></li>
        </ul>
    </div>

    <div class="main-wrapper">
        <div class="top-navbar">
            <button class="toggle-btn" id="toggle-sidebar">☰</button>
            <h3 style="margin-left: 20px; font-weight: 500; color: #444;">Sistem Manajemen Kepegawaian</h3>
        </div>
        <iframe src="html/pegawai.html" class="content-frame" id="contentFrame" name="contentFrame"></iframe>
    </div>

    <script src="utama.js"></script>
</body>
</html>
